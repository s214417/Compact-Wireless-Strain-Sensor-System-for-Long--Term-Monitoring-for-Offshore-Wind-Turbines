            view_layout:
              grid-column: 1 / -1
            content: |
              <center>Park Overview Graphical User Interface<br><br>Tap a turbine to view the flanges and furthermore to view individual nuts</center>
      - type: custom:layout-card
        layout_type: grid
        layout: *legend_grid
        mediaquery: *wide_grid_fixed_mediaquery
        cards:
          - type: custom:button-card
            template: shm_legend
            name: Green = OK
            styles:
              card:
                - background: rgba(76, 175, 80, 0.12)
              name:
                - color: "#2e7d32"
          - type: custom:button-card
            template: shm_legend
            name: Yellow = Warning
            styles:
              card:
                - background: rgba(255, 179, 0, 0.16)
              name:
                - color: "#f57c00"
          - type: custom:button-card
            template: shm_legend
            name: Red = Critical
            styles:
              card:
                - background: rgba(229, 57, 53, 0.14)
              name:
                - color: "#c62828"
      - type: custom:layout-card
